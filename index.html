<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>手风琴测试</title>
        <style>
            * {
                margin: ;
                padding: 0;
            }

            .content {
                width: 90%;
                position: absolute;
                transform: translate(-50%, -50%);
                left: 50%;
                top: 50%;
                height: 500px;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .list {
                position: relative;
                flex: 0.3;
                margin: 10px;
                height: 100%;
                weight: 50%
                border-radius: 30px;
                cursor: pointer;
                overflow: hidden;
                transition: 1s all ease-in-out;
            }

            h3 {
                position: absolute;
                bottom: 10px;
                left: 10px;
                font-size: 30px;
                font-family: '楷体';
                color: #fff;
                opacity: 0;
                transition: 1s all ease-in-out;
            }

            .active {
                position: relative;
                flex: 3;
                margin: 10px;
                height: 100%;
                border-radius: 30px;
                cursor: pointer;
                overflow: hidden;
                transition: 1s all ease-in-out;
            }
        </style>

<link rel="stylesheet" href="styles.css">
</head>
    <body>
        <div class="content">
            <div class="list active">
                <h3><a href=https://space.bilibili.com/1>B站</a></h3>
            </div>
            <div class="list">
                <h3>A站</h3>
            </div>
            <div class="list">
                <h3>m站</h3>
            </div>
            <div class="list">
                <h3>推特</h3>
            </div>
            <div class="list">
                <h3>测试</h3>
            </div>
        </div>
        <script src="main1.js"></script>
    </body>
</html>
